<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎬 InstaGalaxy - Reels</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #000;
            color: white;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
        }

        /* 🎨 HEADER */
        .top-bar {
            height: 55px;
            background: linear-gradient(180deg, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.8) 100%);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 10px;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 200;
            backdrop-filter: blur(15px);
        }

        .logo {
            font-weight: 800;
            font-size: 1.3rem;
            background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888, #9c27b0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
            cursor: pointer;
            position: relative;
        }

        .logo::after {
            content: '✨';
            position: absolute;
            right: -18px;
            top: -3px;
            font-size: 0.8rem;
            animation: sparkle 2s ease-in-out infinite;
        }

        @keyframes sparkle {
            0%, 100% { opacity: 1; transform: scale(1) rotate(0deg); }
            50% { opacity: 0.7; transform: scale(0.8) rotate(15deg); }
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* 🤖 BOUTON IA */
        .ai-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 20px;
            padding: 6px 14px;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }

        .ai-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer { 0% { left: -100%; } 100% { left: 100%; } }

        .ai-button:active { transform: scale(0.92); }
        .ai-button .ai-icon { font-size: 1.1rem; }
        .ai-button .ai-label { font-size: 0.75rem; font-weight: 700; color: white; white-space: nowrap; }
        .ai-button .ai-arrow { font-size: 0.7rem; opacity: 0.8; animation: bounceArrow 1.5s ease-in-out infinite; }
        @keyframes bounceArrow { 0%, 100% { transform: translateX(0); } 50% { transform: translateX(3px); } }

        .header-btn {
            background: none; border: none; font-size: 1.4rem; cursor: pointer; color: white;
            position: relative; transition: transform 0.1s; padding: 5px;
        }
        .header-btn:active { transform: scale(0.85); }
        .header-btn .badge {
            position: absolute; top: 2px; right: 2px; background: #ff3040; color: white;
            font-size: 0.65rem; font-weight: bold; padding: 2px 5px; border-radius: 10px;
            min-width: 16px; text-align: center; animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15); } }

        /* 🎬 FEED REELS */
        #reels-feed {
            flex: 1;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
            padding-top: 55px;
            padding-bottom: 65px;
            position: relative;
            scrollbar-width: none;
        }
        #reels-feed::-webkit-scrollbar { display: none; }

        .reel-card {
            height: calc(100vh - 120px);
            width: 100vw;
            scroll-snap-align: start;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f0f23 100%);
            overflow: hidden;
        }

        .reel-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* 🎵 Audio Bar */
        .audio-bar {
            position: absolute;
            bottom: 70px;
            left: 15px;
            right: 75px;
            background: rgba(0,0,0,0.6);
            border-radius: 25px;
            padding: 8px 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 10;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .audio-disc {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(45deg, #f09433, #bc1888);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            animation: spin 3s linear infinite;
            animation-play-state: paused;
        }
        .reel-card.playing .audio-disc { animation-play-state: running; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .audio-info {
            flex: 1;
            overflow: hidden;
        }

        .audio-title {
            font-size: 0.85rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .audio-artist {
            font-size: 0.75rem;
            opacity: 0.7;
        }

        .audio-wave {
            display: flex;
            align-items: center;
            gap: 2px;
            height: 20px;
        }

        .wave-bar {
            width: 3px;
            background: linear-gradient(to top, #f09433, #bc1888);
            border-radius: 2px;
            animation: wave 0.5s ease-in-out infinite alternate;
        }
        .wave-bar:nth-child(2) { animation-delay: 0.1s; height: 12px; }
        .wave-bar:nth-child(3) { animation-delay: 0.2s; height: 18px; }
        .wave-bar:nth-child(4) { animation-delay: 0.3s; height: 10px; }
        .wave-bar:nth-child(5) { animation-delay: 0.4s; height: 15px; }
        .reel-card.paused .wave-bar { animation-play-state: paused; }
        @keyframes wave { from { transform: scaleY(0.3); } to { transform: scaleY(1); } }

        /* 🎬 Overlay infos */
        .reel-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 50%;
            background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.4) 40%, transparent 100%);
            pointer-events: none;
            z-index: 2;
        }

        .reel-info {
            position: absolute;
            bottom: 130px;
            left: 15px;
            right: 75px;
            z-index: 3;
            pointer-events: none;
        }

        .reel-user {
            font-weight: 700;
            font-size: 1.05rem;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .reel-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(45deg, #f09433, #bc1888);
            border: 2.5px solid white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .reel-desc {
            font-size: 0.95rem;
            opacity: 0.98;
            line-height: 1.35;
            margin-bottom: 8px;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
        }

        .reel-hashtags { color: #87cefa; font-weight: 500; }

        .reel-stats {
            font-size: 0.85rem;
            opacity: 0.85;
            display: flex;
            gap: 15px;
        }

        /* 🎮 Actions Panel */
        .actions-panel {
            position: absolute;
            right: 12px;
            bottom: 140px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 22px;
            z-index: 3;
        }

        .action-btn {
            background: none; border: none; color: white; font-size: 1.7rem; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; gap: 3px;
            transition: transform 0.12s cubic-bezier(0.34, 1.56, 0.64, 1);
            pointer-events: auto; position: relative;
        }
        .action-btn:active { transform: scale(0.82); }
        .action-btn.liked { color: #ff3040; animation: heartPop 0.4s ease; }
        @keyframes heartPop {
            0% { transform: scale(1); } 40% { transform: scale(1.35); }
            60% { transform: scale(0.95); } 100% { transform: scale(1); }
        }
        .action-count { font-size: 0.72rem; font-weight: 600; opacity: 0.95; }

        .profile-pic-action {
            width: 45px; height: 45px; border-radius: 50%;
            border: 2.5px solid white;
            background: linear-gradient(45deg, #667eea, #764ba2);
            margin-bottom: 5px; cursor: pointer; transition: transform 0.2s;
            display: flex; align-items: center; justify-content: center; font-size: 1.3rem;
        }
        .profile-pic-action:active { transform: scale(0.9); }

        /* ✨ Effets visuels */
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            20% { transform: translate(-2px, 0) rotate(-1.5deg); }
            40% { transform: translate(2px, -1px) rotate(1deg); }
            60% { transform: translate(-1px, 2px) rotate(0deg); }
            80% { transform: translate(1px, -2px) rotate(-1deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }
        .shaking { animation: shake 0.22s cubic-bezier(0.36, 0.07, 0.19, 0.97); }

        /* ✨ Étoiles magiques */
        .magic-star {
            position: fixed; font-size: 26px; pointer-events: none;
            animation: starFly 1s ease-out forwards; z-index: 1000; opacity: 0;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4));
        }
        @keyframes starFly {
            0% { transform: translate(0, 0) scale(0.2) rotate(0deg); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(1.6) rotate(var(--rot)); opacity: 0; }
        }

        /* 🎊 Confettis */
        .confetti {
            position: fixed; width: 10px; height: 10px; pointer-events: none;
            animation: confettiFall 2.5s ease-out forwards; z-index: 1001;
        }
        @keyframes confettiFall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        /* ▶️ Play/Pause overlay */
        .play-pause-overlay {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            font-size: 4.5rem; color: white; opacity: 0;
            transition: all 0.2s ease; pointer-events: none; z-index: 5;
            text-shadow: 0 4px 20px rgba(0,0,0,0.6);
        }
        .reel-card.paused .play-pause-overlay { 
            opacity: 0.9; transform: translate(-50%, -50%) scale(1);
        }

        /* 📈 Progress bar */
        .progress-bar {
            position: absolute; bottom: 0; left: 0; height: 3px;
            background: linear-gradient(90deg, #bc1888, #f09433);
            width: 0%; transition: width 0.1s linear; z-index: 4;
        }

        /* 🎭 Loader */
        .reel-loader {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: white; font-size: 1.2rem;
            display: flex; align-items: center; gap: 10px;
            background: rgba(0,0,0,0.7);
            padding: 15px 25px; border-radius: 30px;
            backdrop-filter: blur(10px);
        }
        .loader-spinner {
            width: 20px; height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: #bc1888; border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        /* 🧭 BOTTOM NAV */
        .bottom-nav {
            height: 65px;
            background: linear-gradient(0deg, rgba(0,0,0,0.98) 0%, rgba(0,0,0,0.9) 100%);
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex; justify-content: space-around; align-items: center;
            position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
            backdrop-filter: blur(15px);
        }

        .nav-item {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 3px; padding: 8px 5px; cursor: pointer; color: rgba(255,255,255,0.7);
            transition: all 0.2s; position: relative; font-size: 1.35rem;
            flex: 1; max-width: 70px;
        }
        .nav-item:active { transform: scale(0.92); color: white; }
        .nav-item.active { color: white; }
        .nav-item.active::after {
            content: ''; position: absolute; bottom: 2px; width: 22px; height: 3px;
            background: linear-gradient(90deg, #f09433, #bc1888); border-radius: 3px;
            animation: underlineGlow 2s ease-in-out infinite;
        }
        @keyframes underlineGlow {
            0%, 100% { opacity: 1; box-shadow: 0 0 5px rgba(188,24,136,0.5); }
            50% { opacity: 0.8; box-shadow: 0 0 12px rgba(240,148,51,0.8); }
        }
        .nav-label { font-size: 0.65rem; font-weight: 500; opacity: 0.85; }
        .nav-item.active .nav-label { opacity: 1; font-weight: 600; }

        /* 🔔 Notifications */
        .nav-item.has-notification::before {
            content: ''; position: absolute; top: 8px; right: 12px;
            width: 9px; height: 9px; background: #ff3040; border-radius: 50%;
            border: 2px solid #000; animation: notificationPulse 1.5s ease-in-out infinite;
        }
        .nav-item.has-notification.new-content::before {
            background: linear-gradient(45deg, #ff3040, #f09433);
            animation: notificationPulse 1s ease-in-out infinite;
        }
        @keyframes notificationPulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.25); opacity: 0.9; }
        }
        .nav-item .badge-number {
            position: absolute; top: 5px; right: 10px; background: #ff3040;
            color: white; font-size: 0.6rem; font-weight: bold;
            padding: 2px 6px; border-radius: 10px; min-width: 18px; text-align: center;
            animation: pulse 1.5s ease-in-out infinite;
        }

        /* 🔔 Toast */
        #toast {
            position: fixed; bottom: 85px; left: 50%; transform: translateX(-50%);
            background: rgba(30,30,50,0.95); color: white; padding: 12px 24px;
            border-radius: 30px; font-size: 0.9rem; z-index: 1000; opacity: 0;
            transition: opacity 0.3s, transform 0.3s; backdrop-filter: blur(10px);
            border: 1px solid rgba(188,24,136,0.4); box-shadow: 0 8px 30px rgba(0,0,0,0.4);
            pointer-events: none;
        }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* 📱 Responsive */
        @media (max-height: 700px) {
            .top-bar { height: 50px; }
            .bottom-nav { height: 58px; }
            .reel-card { height: calc(100vh - 108px); }
            #reels-feed { padding-top: 50px; padding-bottom: 58px; }
            .ai-button .ai-label { display: none; }
        }
        @media (max-width: 380px) {
            .ai-button .ai-label { display: none; }
            .logo { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

        <div style="background:linear-gradient(135deg,#1a1a2e,#16213e);border-radius:25px;padding:25px;width:90%;max-width:400px;border:1px solid rgba(255,255,255,0.15);">

    <script>
        // ⚙️ CONFIG
        const CONFIG = {
            reels: [
                { id:1, video:'https://assets.mixkit.co/videos/preview/mixkit-winter-fashion-show-40018-large.mp4', user:'fashion_daily', desc:'Look hiver 🔥❄️ <span class="reel-hashtags">#mode #style</span>', likes:2341, comments:156, views:'12.5K', audio:'Son original - fashion_daily', avatar:'👗' },
                { id:2, video:'https://assets.mixkit.co/videos/preview/mixkit-tree-with-yellow-flowers-1173-large.mp4', user:'nature_lover', desc:'Printemps 🌸✨ <span class="reel-hashtags">#nature #peace</span>', likes:8921, comments:432, views:'45.2K', audio:'Spring Vibes 🎵', avatar:'🌿' },

                { id:4, video:'https://assets.mixkit.co/videos/preview/mixkit-sea-waves-at-sunset-1162-large.mp4', user:'ocean_vibes', desc:'Coucher soleil 🌅🌊 <span class="reel-hashtags">#ocean #sunset</span>', likes:6543, comments:287, views:'32.8K', audio:'Ocean Waves 🌊', avatar:'🌊' },
                { id:5, video:'https://assets.mixkit.co/videos/preview/mixkit-city-traffic-at-night-1165-large.mp4', user:'urban_explorer', desc:'Ville de nuit 🌃✨ <span class="reel-hashtags">#city #night</span>', likes:4210, comments:198, views:'21.4K', audio:'City Lights 🎶', avatar:'🏙️' }
            ],
            batchSize: 3,
            likeMilestones: [10,25,50,100,250,500,1000]
        };

        // 🤖 IA
        const AI_OPTIONS = {
            qwen: {name:'Qwen',icon:'💜',url:'https://chat.qwen.ai/'},
            chatgpt: {name:'ChatGPT',icon:'🟢',url:'https://chat.openai.com/'},
            claude: {name:'Claude',icon:'🟠',url:'https://claude.ai/'},
            gemini: {name:'Gemini',icon:'🔵',url:'https://gemini.google.com/'},
            copilot: {name:'Copilot',icon:'🟣',url:'https://copilot.microsoft.com/'},

        };

        // 🧠 État
        let reels = [...CONFIG.reels];
        let currentIndex = 0;
        let isLoading = false;
        let observer = null;
        let selectedAI = localStorage.getItem('instaGalaxy_selectedAI') || 'qwen';
        let tempSelectedAI = selectedAI;
        let totalLikes = parseInt(localStorage.getItem('instaGalaxy_totalLikes')||'0');
        let nextMilestone = parseInt(localStorage.getItem('instaGalaxy_nextMilestone')||'0');
        let soundEnabled = localStorage.getItem('instaGalaxy_sound') === 'true';

        // 🎵 Sons
        const SOUNDS = {
            like: 'https://assets.mixkit.co/sfx/preview/mixkit-modern-technology-select-3124.mp3',
            comment: 'https://assets.mixkit.co/sfx/preview/mixkit-software-interface-click-2447.mp3',
            share: 'https://assets.mixkit.co/sfx/preview/mixkit-sci-fi-click-900.mp3',
            milestone: 'https://assets.mixkit.co/sfx/preview/mixkit-winning-chimes-2015.mp3',
            notification: 'https://assets.mixkit.co/sfx/preview/mixkit-interface-hint-notification-914.mp3',
            ai: 'https://assets.mixkit.co/sfx/preview/mixkit-sci-fi-interface-beep-2292.mp3'
        };

        // 🎯 Init
        document.addEventListener('DOMContentLoaded', async () => {
            updateAIButton();
            updateSoundIcon();
            await loadReels();
            setupInfiniteScroll();
            setupTouchGestures();
            setTimeout(() => { updateVisibleReel(); startAutoPlay(); }, 500);
            document.addEventListener('click', enableAudio, {once:true});
        });

        function enableAudio() {
            const ctx = new (window.AudioContext||window.webkitAudioContext)();
            ctx.resume();
        }

        function playSound(name) { if(!soundEnabled) return; const a=new Audio(SOUNDS[name]); a.volume=0.3; a.play().catch(()=>{}); }

        function toggleSound(e) {
            triggerMagic(e.target,e);
            soundEnabled = !soundEnabled;
            localStorage.setItem('instaGalaxy_sound', soundEnabled);
            updateSoundIcon();
            showToast(soundEnabled?'🔊 Son activé':'🔇 Son désactivé');
        }
        function updateSoundIcon() {
            const t = document.getElementById('soundToggle');
            if(t) { t.textContent = soundEnabled?'🔊':'🔇'; t.classList.toggle('muted',!soundEnabled); }
        }

        // 🤖 IA Button
        function updateAIButton() {
            const ai = AI_OPTIONS[selectedAI];
            if(ai) {
                document.getElementById('aiLabel').textContent = ai.name;
                document.querySelector('#aiButton .ai-icon').textContent = ai.icon;
            }
        }
        function openAIModal(e) {
            triggerMagic(e.currentTarget,e); playSound('ai');
            tempSelectedAI = selectedAI;
            document.querySelectorAll('.ai-option').forEach(opt => {
                const sel = opt.dataset.ai === tempSelectedAI;
                opt.style.borderColor = sel ? '#667eea' : 'transparent';
                opt.querySelector('div:last-child').style.opacity = sel ? '1' : '0';
            });
            document.getElementById('aiModalOverlay').style.display = 'flex';
            setTimeout(() => document.getElementById('aiModalOverlay').style.opacity = '1', 10);
        }
        function closeAIModal(e) {
            const o = document.getElementById('aiModalOverlay');
            o.style.opacity = '0';
            setTimeout(() => o.style.display = 'none', 300);
        }
        function selectAI(opt) {
            triggerMagic(opt,event); playSound('like');
            tempSelectedAI = opt.dataset.ai;
            document.querySelectorAll('.ai-option').forEach(o => {
                const sel = o.dataset.ai === tempSelectedAI;
                o.style.borderColor = sel ? '#667eea' : 'transparent';
                o.querySelector('div:last-child').style.opacity = sel ? '1' : '0';
            });
        }
        function confirmAISelection(e) {
            triggerMagic(e.target,e); playSound('milestone');
            selectedAI = tempSelectedAI;
            localStorage.setItem('instaGalaxy_selectedAI', selectedAI);
            updateAIButton();
            closeAIModal(e);
            showToast(`🤖 ${AI_OPTIONS[selectedAI].name} sélectionné !`);
            setTimeout(() => window.open(AI_OPTIONS[selectedAI].url, '_blank'), 1000);
        }

        // 🎬 Charger Reels
        async function loadReels() {
            const feed = document.getElementById('reels-feed');
            feed.innerHTML = '';
            renderReels(0, CONFIG.batchSize);
        }

        function renderReels(start, count) {
            const feed = document.getElementById('reels-feed');
            reels.slice(start, start+count).forEach((reel, idx) => {
                const card = document.createElement('div');
                card.className = 'reel-card paused';
                card.dataset.index = start+idx;
                card.dataset.id = reel.id;
                card.innerHTML = `
                    <video class="reel-video" src="${reel.video}" loop playsinline preload="metadata" muted></video>
                    <div class="play-pause-overlay">▶️</div>
                    <div class="progress-bar"></div>
                    <div class="reel-overlay"></div>
                    
                    <div class="audio-bar">
                        <div class="audio-disc">💿</div>
                        <div class="audio-info">
                            <div class="audio-title">${reel.audio}</div>
                            <div class="audio-artist">${reel.user}</div>
                        </div>
                        <div class="audio-wave">
                            <div class="wave-bar"></div><div class="wave-bar"></div>
                            <div class="wave-bar"></div><div class="wave-bar"></div>
                            <div class="wave-bar"></div>
                        </div>
                    </div>
                    
                    <div class="reel-info">
                        <div class="reel-user">
                            <div class="reel-avatar">${reel.avatar}</div>
                            @${reel.user}
                            <button class="follow-btn" onclick="toggleFollow(this,event)" style="margin-left:auto;background:transparent;border:1.5px solid white;color:white;padding:5px 14px;border-radius:20px;font-size:0.8rem;font-weight:600;cursor:pointer;">Suivre</button>
                        </div>
                        <div class="reel-desc">${reel.desc}</div>
                        <div class="reel-stats">
                            <span>❤️ <strong class="like-count">${formatNumber(reel.likes)}</strong></span>
                            <span>💬 ${formatNumber(reel.comments)}</span>
                            <span>👁️ ${reel.views}</span>
                        </div>
                    </div>
                    
                    <div class="actions-panel">
                        <div class="profile-pic-action" onclick="triggerMagic(this,event)">${reel.avatar}</div>
                        <button class="action-btn heart-btn" data-action="like">❤️ <span class="action-count">${formatNumber(reel.likes)}</span></button>
                        <button class="action-btn" data-action="comment">💬</button>
                        <button class="action-btn" data-action="share">🚀</button>
                        <button class="action-btn" data-action="save">🔖</button>
                    </div>
                `;
                feed.appendChild(card);
                setupReelInteractions(card);
            });
        }

        // 🔄 Infinite Scroll
        function setupInfiniteScroll() {
            observer = new IntersectionObserver(entries => {
                if(entries[entries.length-1].isIntersecting && !isLoading) loadMoreReels();
            }, {rootMargin:'150px'});
            updateObserver();
        }
        function updateObserver() {
            const cards = document.querySelectorAll('.reel-card');
            if(cards.length) observer.observe(cards[cards.length-1]);
        }
        async function loadMoreReels() {
            if(isLoading) return;
            isLoading = true;
            const next = currentIndex + CONFIG.batchSize;
            if(next < reels.length) {
                renderReels(next, CONFIG.batchSize);
                currentIndex = next;
            } else {
                // Boucle
                currentIndex = 0;
                renderReels(0, CONFIG.batchSize);
            }
            isLoading = false;
            updateObserver();
        }

        // 👆 Interactions
        function setupReelInteractions(card) {
            const video = card.querySelector('.reel-video');
            const progress = card.querySelector('.progress-bar');
            
            // Play/Pause
            card.addEventListener('click', e => {
                if(e.target.closest('.action-btn,.follow-btn,.profile-pic-action')) return;
                if(video.paused) { video.play().catch(()=>{}); card.classList.remove('paused'); triggerMagic(e.target,e); }
                else { video.pause(); card.classList.add('paused'); }
            });

            // Double-tap like
            let lastTap = 0;
            card.addEventListener('touchend', e => {
                const now = Date.now();
                if(now - lastTap < 320) {
                    const heart = card.querySelector('.heart-btn');
                    if(!heart.classList.contains('liked')) { heart.click(); createStars(e.touches?.[0]?.clientX||e.clientX, e.touches?.[0]?.clientY||e.clientY, '#ff3040'); }
                }
                lastTap = now;
            });

            // Progress
            video.addEventListener('timeupdate', () => {
                if(video.duration) progress.style.width = `${(video.currentTime/video.duration)*100}%`;
            });
            video.addEventListener('ended', () => { video.currentTime=0; video.play().catch(()=>{}); });

            // Actions
            card.querySelectorAll('.action-btn').forEach(btn => {
                btn.addEventListener('click', e => { e.stopPropagation(); handleAction(btn, card, video); });
            });
        }

        function handleAction(btn, card, video) {
            const action = btn.dataset.action;
            if(navigator.vibrate) navigator.vibrate(35);
            btn.classList.add('shaking');
            setTimeout(() => btn.classList.remove('shaking'), 180);
            const rect = btn.getBoundingClientRect();

            switch(action) {
                case 'like':
                    btn.classList.toggle('liked');
                    const cnt = btn.querySelector('.action-count'), likeCnt = card.querySelector('.like-count');
                    let c = parseInt(cnt.textContent.replace(/[^0-9]/g,''))||0;
                    const nc = btn.classList.contains('liked') ? c+1 : Math.max(0,c-1);
                    cnt.textContent = formatNumber(nc); likeCnt.textContent = formatNumber(nc);
                    if(btn.classList.contains('liked')) { playSound('like'); createStars(rect.left+20, rect.top, '#ff3040'); if(navigator.vibrate) navigator.vibrate([25,40,25]); trackLike(); }
                    break;
                case 'comment': playSound('comment'); createStars(rect.left, rect.top, '#00FFFF'); showToast('💬 Commentaires...'); break;
                case 'share': playSound('share'); createStars(rect.left, rect.top, '#FFD700'); if(navigator.share) navigator.share({title:'InstaGalaxy Reel', text:card.querySelector('.reel-desc').textContent, url:location.href}).catch(()=>showToast('🔗 Copié!')); else showToast('🔗 Lien copié!'); break;
                case 'save': playSound('comment'); createStars(rect.left, rect.top, '#FFFFFF'); btn.innerHTML = btn.innerHTML.includes('✅')?'🔖 <span class="action-count">Sauv.</span>':'✅ <span class="action-count">OK</span>'; showToast(btn.innerHTML.includes('✅')?'💾 Enregistré!':'🗑️ Retiré'); break;
            }
        }

        function toggleFollow(btn, e) {
            e.stopPropagation(); if(navigator.vibrate) navigator.vibrate(25);
            const isF = btn.classList.contains('following');
            btn.classList.toggle('following');
            btn.textContent = isF?'Suivre':'Suivi ✓';
            btn.style.background = isF?'transparent':'rgba(255,255,255,0.2)';
            const av = btn.closest('.reel-user').querySelector('.reel-avatar');
            av.style.borderColor = isF?'white':'#bc1888';
            createStars(btn.getBoundingClientRect().left, btn.getBoundingClientRect().top, isF?'white':'#bc1888');
            playSound('like');
            showToast(isF?'👋 Désabonné':'🎉 Tu suis ce compte!');
        }

        function trackLike() {
            totalLikes++; localStorage.setItem('instaGalaxy_totalLikes', totalLikes);
            checkMilestones();
        }
        function checkMilestones() {
            const ms = CONFIG.likeMilestones;
            if(nextMilestone < ms.length && totalLikes >= ms[nextMilestone]) {
                playSound('milestone'); launchConfettis();
                showToast(`🎉 ${ms[nextMilestone]} likes atteints!`);
                nextMilestone++; localStorage.setItem('instaGalaxy_nextMilestone', nextMilestone);
            }
        }
        function launchConfettis() {
            const cols = ['#ff3040','#f09433','#00FFFF','#FFD700','#bc1888','#00ff00','#667eea'];
            for(let i=0;i<80;i++) setTimeout(()=>{
                const c=document.createElement('div'); c.className='confetti';
                c.style.left=Math.random()*100+'vw'; c.style.background=cols[Math.floor(Math.random()*cols.length)];
                c.style.animationDuration=(Math.random()*1.5+1.5)+'s'; c.style.transform=`rotate(${Math.random()*360}deg)`;
                document.body.appendChild(c); setTimeout(()=>c.remove(),3000);
            }, i*30);
        }

        // ✨ Stars
        function createStars(x,y,color='#FFD700') {
            const em = ['✨','⭐','🌟','💫','🎇','💖','🎬'];
            for(let i=0;i<14;i++) {
                const s=document.createElement('div'); s.className='magic-star';
                s.textContent=em[Math.floor(Math.random()*em.length)];
                s.style.left=x+'px'; s.style.top=y+'px'; s.style.color=color;
                s.style.setProperty('--tx',(Math.random()-0.5)*180+'px');
                s.style.setProperty('--ty',(Math.random()-0.5)*180-100+'px');
                s.style.setProperty('--rot',(Math.random()-0.5)*720+'deg');
                document.body.appendChild(s); setTimeout(()=>s.remove(),1000);
            }
        }

        // 🔄 Auto-play visible reel
        function startAutoPlay() { setInterval(updateVisibleReel, 300); }
        function updateVisibleReel() {
            const cards = document.querySelectorAll('.reel-card'), feed = document.getElementById('reels-feed');
            const fr = feed.getBoundingClientRect();
            let best = null, maxVis = 0;
            cards.forEach(card => {
                const r = card.getBoundingClientRect();
                const vis = (Math.min(r.bottom,fr.bottom)-Math.max(r.top,fr.top))/r.height;
                if(vis>maxVis && vis>0.5) { maxVis=vis; best=card; }
            });
            if(best) {
                const v = best.querySelector('.reel-video');
                document.querySelectorAll('.reel-video').forEach(vv => { if(vv!==v && !vv.paused) { vv.pause(); vv.closest('.reel-card').classList.add('paused'); } });
                if(v.paused && !best.classList.contains('paused')) v.play().catch(()=>best.classList.add('paused'));
            }
        }

        // 📱 Touch gestures
        function setupTouchGestures() {
            const feed = document.getElementById('reels-feed');
            let sy=0, cy=0;
            feed.addEventListener('touchstart', e=>{sy=e.touches[0].clientY;},{passive:true});
            feed.addEventListener('touchmove', e=>{cy=e.touches[0].clientY;},{passive:true});
            feed.addEventListener('touchend', () => { if(Math.abs(sy-cy)>80) setTimeout(updateVisibleReel,120); sy=0;cy=0; });
            feed.addEventListener('scroll', () => { clearTimeout(window._st); window._st=setTimeout(updateVisibleReel,80); }, {passive:true});
        }

        // 🧭 Nav
        function navigateTo(item, e) {
            triggerMagic(item,e); playSound('notification');
            document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
            item.classList.add('active');
            const p = item.dataset.page;
            if(p==='home') { showToast('🏠 Accueil...'); /* window.location='index.html' */ }
            else if(p==='search') { showToast('🔍 Recherche...'); /* window.location='search.html' */ }
            else if(p==='reels') showToast('🎬 Tu es dans Reels!');
            else showToast('🚧 Page en construction!');
            item.classList.remove('has-notification'); item.querySelector('.badge-number')?.remove();
        }

        // 🔔 Toast
        function showToast(msg) {
            let t = document.getElementById('toast');
            if(!t) { t=document.createElement('div'); t.id='toast'; document.body.appendChild(t); }
            t.textContent = msg; t.classList.add('show');
            setTimeout(()=>t.classList.remove('show'), 2200);
        }

        // 🔢 Utils
        function formatNumber(n) { if(n>=1e6) return (n/1e6).toFixed(1)+'M'; if(n>=1e3) return (n/1e3).toFixed(1)+'k'; return n.toString(); }

        // ✨ Magic feedback
        function triggerMagic(el, e) {
            if(navigator.vibrate) navigator.vibrate(25);
            el.classList.add('shaking'); setTimeout(()=>el.classList.remove('shaking'),150);
            if(el.classList.contains('nav-item')||el.classList.contains('logo')||el.classList.contains('ai-button')) {
                const r = el.getBoundingClientRect();
                for(let i=0;i<5;i++) setTimeout(()=>createStars(r.left+Math.random()*r.width, r.top+Math.random()*r.height, ['#FFD700','#bc1888','#00FFFF','#667eea'][Math.floor(Math.random()*4)]), i*50);
            }
        }

        // 🎵 Unlock audio
        document.addEventListener('click', () => { document.querySelectorAll('.reel-video').forEach(v=>v.muted=false); }, {once:true});

        // 🤖 Close modal on escape/outside
        document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeAIModal(e); });
        document.getElementById('aiModalOverlay').addEventListener('click', e=>{ if(e.target.id==='aiModalOverlay') closeAIModal(e); });
    </script>
</body>
</html>
